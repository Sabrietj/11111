# ==========================================
# 兼容性配置（保持现有API不变）
# ==========================================
# 以下section会根据ACTIVE_DATASET自动填充，保持现有代码兼容性
[PATH]
# 这些值会根据ACTIVE_DATASET自动填充
path_to_dataset = AUTO_FILL
plot_data_path = AUTO_FILL

[SESSION]
# 控制 session_tuple 的组成方式：
# 可选值: "srcIP", "dstIP", "srcIP_dstIP", "srcIP_dstIP_proto", "srcIP_dstIP_dstPort", "srcIP_dstIP_dstPort_proto"
# 对应含义：
#   "srcIP"                  => 一元组 (源IP)
#   "dstIP"                  => 一元组 (目的IP)
#   "srcIP_dstIP"            => 二元组 (源IP, 目标IP)
#   srcIP_dstIP_dstPort      => 三元组 (源IP, 目标IP, 目标端口)
#   "srcIP_dstIP_proto"      => 三元组 (源IP, 目标IP, 协议)
#   "srcIP_dstIP_dstPort_proto" => 四元组 (源IP, 目标IP, 目标端口, 协议) [默认]
#   "srcIP_srcPort_dstIP_dstPort_proto" => 五元组 (源IP, 源端口，目标IP, 目标端口, 协议) [默认]

# 这些值会根据ACTIVE_DATASET自动填充
session_tuple_mode = AUTO_FILL
session_label_id_map = AUTO_FILL
concurrent_flow_iat_threshold = AUTO_FILL
sequential_flow_iat_threshold = AUTO_FILL

# =========================
# 域名层级拆分配置段
# =========================
[DOMAIN_HIERARCHY]
# 域名拆分层级数 (默认5层)
domain_split_levels = 5
# 是否启用域名层级拆分
enable_domain_hierarchy = true
# 层级权重配置 (可选，用于加权合并)
level_weights = 0.1,0.2,0.3,0.2,0.2

[MODEL_PARAMS]
# 根据需求设置，可以设置为128/256/512等等，建议不超过512
max_packet_sequence_length = 256
# 或 "bert_uncased_L-2_H-128_A-2"，“bert_uncased_L-4_H-256_A-4”，或者"bert-base-uncased"
# → bert_uncased_L-2_H-128_A-2 是一个 极小的微型 BERT（MiniBERT）
# → bert_uncased_L-4_H-256_A-4 比 MiniBERT 强很多，但远比 BERT-base 轻。貌似在Nvidia A800的服务器上报错pytorch版本低。
# → bert-base-uncased 是原版标准 BERT。
text_encoder_name = bert_uncased_L-2_H-128_A-2
# max_text_length用来限定XXXX_textual_features的合并文本的最大长度，超长的部分会阶段。
# 仅 DNS textual	16–32	query/answer 非常短
# DNS + SSL textual	32–64	SSL subject/issuer 有时较长
# DNS + SSL + X509 textual（你的情况）	64（最均衡）	适中，能保留足够信息，又不会拖慢 BERT
# 你想完整保留 certificate textual	128	更长但速度下降明显
max_text_length = 64
enabled_flow_node_views = {"flow_numeric_features": true, "flow_categorical_features": true, "flow_textual_features": true, "packet_len_seq": true, "packet_iat_seq": true, "domain_probs": true, "ssl_numeric_features": true, "ssl_categorical_features": true, "ssl_textual_features": true, "x509_numeric_features": true, "x509_categorical_features": true, "x509_textual_features": true, "dns_numeric_features": true, "dns_categorical_features": true, "dns_textual_features": true}
# 控制 flow_relation_graph 中的最大节点数，超过这个数的图会被丢弃或截断。根据你的数据分布调整，建议设置在 64-256 之间，以平衡信息保留和计算效率。
# 64 是一个比较保守的选择，适合大多数情况，能保留足够的结构信息，同时避免过大的图导致训练不稳定或内存不足。
# 采用四元组 srcIP–dstIP–dstPort–proto 作为 session key 的最大挑战在于，它往往会构建出节点数量较大的流关系图。
# 例如，在高并发扫描或 DDoS 场景下，一个 session graph 可能包含 512 个 flow 节点甚至更多。这对 GNN 的建模能力提出了更高要求。
# 更关键的问题在于：每个 flow 节点上还运行一个多视图表示学习模型。例如，在 packet-sequence 视图中，每个 flow 都包含一个长度为 
# 256 的 packet token 序列，并通过 Transformer 进行编码。
# 因此，在一个 batch 内，模型的计算图实际上是：GNN 处理 graph-level 结构；每个节点内部嵌套一个 Transformer；多视图特征在节点层面进行融合；
# 最终通过图读出完成 session 级分类。这种 GNN–Transformer 叠加结构 的显存消耗并非简单线性增长，而是与以下因素成乘法关系。假设：
# batch_size = 32
# max_nodes_per_graph = 512
# max_packet_per_flow = 256
# packet_token_dimension = 256
# float32 = 4 Bytes
# 则仅数据包序列特征的 activation 张量规模如下，还别说其他视图的特征：
# 32×512×256×256×4B = 4.29GB
# 而2080TI显卡的显存只有11GB，很容易爆显存。
max_nodes_per_flow_relation_graph = 64

# =========================
# 新增训练模式配置段 by Yifei Qin
# =========================
[TRAINING_MODES]
# 5种运行模式: full, pretrain, supervised, single, end2end
mode = end2end

# 预训练视图列表 (逗号分隔)
pretrain_views = flow_statistics,ssl_features,x509_features,dns_features,directed_packet_length_sequence,directed_packet_iat_sequence

# 监督训练阶段是否冻结编码器
freeze_encoders = true

# =========================
# 新增模型架构配置段  
# =========================
[MODEL_ARCHITECTURE]
# 潜在空间维度
latent_dim = 100

# GAT隐藏层维度
gat_hidden = 64

# GAT注意力头数
gat_heads = 1

# 是否使用三路独立GAT (true) 或共享GAT (false)
use_three_gats = true

# =========================
# 新增训练参数配置段
# =========================
[TRAINING_PARAMS]
# 学习率
learning_rate = 6e-4

# 最大训练轮数
max_epoch = 100

# 早停耐心值
patience = 8

# 批次大小
batch_size = 64

# 按节点数打批的最大节点数 (0表示禁用)
max_nodes_per_batch = 20000

# 自编码器损失权重
ae_loss_weight = 0.1

# MLM损失权重  
mlm_loss_weight = 0.05

# 是否使用FP16特征
use_fp16_feats = true

# =========================
# 新增实验管理配置段
# =========================
[EXPERIMENT_MANAGER]
# 实验名称
experiment_name = Multi-view

# 是否保存检查点
save_checkpoints = true

# 是否启用可视化
enable_visualization = true

# 实验描述
experiment_description = 轻量多视图图神经网络训练实验

# =========================
# 新增指标配置段
# =========================
[METRICS]
# 基础分类指标
compute_accuracy = true
compute_precision = true
compute_recall = true
compute_f1_score = true
compute_auc_pr = true

# 宏平均指标
compute_macro_precision = true
compute_macro_recall = true
compute_macro_f1 = true

# 加权平均指标
compute_weighted_precision = true
compute_weighted_recall = true
compute_weighted_f1 = true

# 每类指标
compute_per_class_metrics = true

# 损失指标
compute_train_loss = true
compute_val_loss = true
compute_test_loss = true

# 注意力权重指标
compute_attention_weights = true

# 多视图指标
compute_view_correlation = true
compute_view_quality = true

# 训练效率指标
compute_epoch_time = true
compute_memory_usage = true

# 可视化语言
visualization_language = english